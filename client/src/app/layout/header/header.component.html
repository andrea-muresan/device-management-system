<header class="shadow-md p-3 w-full">
    <div class="flex align-middle items-center justify-between max-w-(--breakpoint-2xl) mx-auto">
        <img src="/images/logo.png" alt="app logo" class="max-h-14">
        @if (accountService.currentUser()) {
            <nav class="flex gap-3 my-2 uppercase text-xl">
                <a routerLink="/inventory">Inventory</a>
            </nav>
            <div class="flex gap-3 items-center">
                <button mat-stroked-button class="stroked-btn" routerLink="/inventory/add">Add Device</button>
            
                <button mat-flat-button class="view" (click)="logout()">Logout</button>
            </div>
        }

    </div>
</header>
