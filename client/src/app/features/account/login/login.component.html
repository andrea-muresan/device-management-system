<div class="min-h-[80vh] flex items-center justify-center  px-4">
  <div class="max-w-md w-full bg-yellow-50 p-8 rounded-xl shadow-lg border-2 border-b border-yellow-300">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800 italic">Welcome Back</h2>
      <p class="text-gray-500 mt-2">Sign in to manage company devices</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input 
          type="email" 
          formControlName="email"
          [ngClass]="getInputClass('email')"
          class="w-full p-3 rounded-lg border-2 bg-white outline-none transition-all duration-200"
          placeholder="name@company.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input 
          type="password" 
          formControlName="password"
          [ngClass]="getInputClass('password')"
          class="w-full p-3 rounded-lg border-2 bg-white outline-none transition-all duration-200"
          placeholder="••••••••">
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid"
        class="w-full py-3 bg-yellow-600 hover:bg-yellow-700 text-white font-bold rounded-lg transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed">
        Login to Dashboard
      </button>

      <p class="text-center text-sm text-gray-600 mt-4">
        Don't have an account? 
        <a routerLink="/account/register" class="text-yellow-600 font-semibold hover:underline">Sign up</a>
      </p>
    </form>
  </div>
</div>
